name: Build and Package Whitesmoke

on:
  push:
    branches: [ main ]
  push:
    tags: [ 'v*' ]
  workflow_dispatch: {}

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm ci

      - name: Build backend
        run: |
          cd Backend
          npm ci
          npm run build

      - name: Build frontend web
        run: |
          cd Frontend
          npm ci
          npm run build

      - name: Archive artifacts
        run: |
          tar -czf whitesmoke-backend.tar.gz -C Backend dist || true
          tar -czf whitesmoke-frontend-dist.tar.gz -C Frontend dist || true

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: whitesmoke-artifacts
          path: |
            whitesmoke-backend.tar.gz
            whitesmoke-frontend-dist.tar.gz

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: whitesmoke-artifacts

      - name: Create Release (attach artifacts)
        uses: ncipollo/release-action@v1
        with:
          artifacts: |
            whitesmoke-backend.tar.gz
            whitesmoke-frontend-dist.tar.gz
          tag: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          draft: false
          prerelease: false
